apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prod-deployer-role
  namespace: app-prod
  labels:
    app.kubernetes.io/part-of: demo-app
rules:
  # Lecture pods + logs (monitoring CI)
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]

  # Rolling update uniquement — pas de create/delete de deployments
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "update", "patch"]

  # Services et ingress : lecture + mise à jour (pas de suppression)
  - apiGroups: [""]
    resources:
      - services
    verbs: ["get", "list", "watch", "update", "patch"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch", "update", "patch"]