apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-tp-docker-hub-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tp-docker-hub-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50